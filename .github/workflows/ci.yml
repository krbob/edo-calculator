name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_PORT: 8080

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate documentation
        run: python3 scripts/validate-docs.py

      - name: Validate Compose quick start
        run: docker compose config --quiet

      - name: Set up JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      - name: Verify dependency locks
        run: |
          set -euo pipefail
          ./gradlew resolveAndLockAll --write-locks
          lock_changes="$(git status --porcelain -- '*gradle.lockfile')"
          if [[ -n "$lock_changes" ]]; then
            echo "Dependency lockfiles are stale:"
            echo "$lock_changes"
            exit 1
          fi

      - name: Run verification and assemble
        run: ./gradlew test detekt assemble

      - name: Generate reproducible CycloneDX SBOM
        id: sbom
        run: |
          set -euo pipefail
          sbom="build/reports/cyclonedx/edo-calculator.cdx.json"
          ./gradlew cyclonedxBom --rerun-tasks
          first_hash="$(sha256sum "$sbom" | cut -d ' ' -f 1)"
          ./gradlew cyclonedxBom --rerun-tasks
          second_hash="$(sha256sum "$sbom" | cut -d ' ' -f 1)"
          if [[ "$first_hash" != "$second_hash" ]]; then
            echo "CycloneDX SBOM is not reproducible: $first_hash != $second_hash"
            exit 1
          fi
          echo "sha256=$second_hash" >> "$GITHUB_OUTPUT"

      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: edo-calculator-sbom-${{ steps.sbom.outputs.sha256 }}
          path: build/reports/cyclonedx/edo-calculator.cdx.json
          if-no-files-found: error
          retention-days: 14

      - name: Scan runtime dependencies
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: sbom
          scan-ref: build/reports/cyclonedx/edo-calculator.cdx.json
          # renovate: datasource=github-releases depName=aquasecurity/trivy
          version: v0.72.0
          scanners: vuln
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          hide-progress: true
          timeout: 10m0s

      - name: Derive local image tag
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "image=ktor-app:test-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build local image
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
        run: ./gradlew jibDockerBuild --image="$IMAGE"

      - name: Scan local image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.meta.outputs.image }}
          skip-setup-trivy: true
          scanners: vuln
          vuln-type: os
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          hide-progress: true
          timeout: 10m0s

      - name: Run container
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          APP_PORT: ${{ env.APP_PORT }}
        run: |
          docker rm -f app || true
          docker run -d --name app -p "${APP_PORT}:${APP_PORT}" "$IMAGE"

      - name: Deterministic container smoke without GUS
        env:
          APP_PORT: ${{ env.APP_PORT }}
        run: |
          set -euo pipefail
          base="http://localhost:${APP_PORT}"
          request_id="deterministic-container-smoke"
          purchase_date="$(TZ=Europe/Warsaw date -d '30 days ago' +%F)"
          today="$(TZ=Europe/Warsaw date +%F)"
          purchase_year="${purchase_date%%-*}"
          purchase_rest="${purchase_date#*-}"
          purchase_month="${purchase_rest%%-*}"
          purchase_day="${purchase_date##*-}"
          today_year="${today%%-*}"
          today_rest="${today#*-}"
          today_month="${today_rest%%-*}"
          today_day="${today##*-}"

          # Readiness resolves the local dependency graph only. A purchase from 30 days ago is
          # deliberately inside period one, whose fixed rate never requires CPI data from GUS.
          for _ in $(seq 1 60); do
            if curl -fsS --max-time 1 "${base}/healthz" >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS --max-time 3 "${base}/healthz" | grep -Fx 'ok'
          curl -fsS --max-time 3 "${base}/readyz" | grep -Fx 'ready'

          common_query="purchaseYear=${purchase_year}&purchaseMonth=${purchase_month}&purchaseDay=${purchase_day}&firstPeriodRate=2.7&margin=1.5"
          curl -fsS --max-time 5 -H "X-Request-ID: ${request_id}" \
            "${base}/v1/edo/value?${common_query}" -o /tmp/edo-value.json
          curl -fsS --max-time 5 -H "X-Request-ID: ${request_id}" \
            "${base}/v1/edo/value/at?${common_query}&asOfYear=${today_year}&asOfMonth=${today_month}&asOfDay=${today_day}" \
            -o /tmp/edo-value-at.json
          curl -fsS --max-time 5 -H "X-Request-ID: ${request_id}" \
            "${base}/v1/edo/history?${common_query}&fromYear=${purchase_year}&fromMonth=${purchase_month}&fromDay=${purchase_day}&toYear=${today_year}&toMonth=${today_month}&toDay=${today_day}" \
            -o /tmp/edo-history.json
          curl -fsS --max-time 5 -H "X-Request-ID: ${request_id}" \
            "${base}/v1/edo/history?${common_query}" -o /tmp/edo-history-default.json

          PURCHASE_DATE="$purchase_date" TODAY="$today" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          purchase_date = os.environ["PURCHASE_DATE"]
          today = os.environ["TODAY"]
          value = json.loads(Path("/tmp/edo-value.json").read_text())
          value_at = json.loads(Path("/tmp/edo-value-at.json").read_text())
          history = json.loads(Path("/tmp/edo-history.json").read_text())
          history_default = json.loads(Path("/tmp/edo-history-default.json").read_text())

          for payload in (value, value_at):
              assert payload["purchaseDate"] == purchase_date, payload
              assert payload["asOf"] == today, payload
              assert payload["status"] == "ACTIVE", payload
              assert payload["principal"] == "100.00", payload
              assert len(payload["edoValue"]["periods"]) == 1, payload
              assert payload["edoValue"]["periods"][0]["inflationPercent"] is None, payload

          for payload in (history, history_default):
              assert payload["purchaseDate"] == purchase_date, payload
              assert payload["from"] == purchase_date, payload
              assert payload["until"] == today, payload
              assert payload["points"], payload
              assert payload["points"][0]["date"] == purchase_date, payload
              assert payload["points"][-1]["date"] == today, payload
          PY

          invalid_status="$(curl -sS --max-time 3 -D /tmp/edo-invalid.headers \
            -o /tmp/edo-invalid.json -w '%{http_code}' -H "X-Request-ID: ${request_id}" \
            "${base}/v1/edo/value?purchaseYear=${purchase_year}&purchaseMonth=${purchase_month}&purchaseDay=${purchase_day}&firstPeriodRate=invalid&margin=1.5")"
          test "$invalid_status" = "400"
          tr -d '\r' < /tmp/edo-invalid.headers | grep -qi "^x-request-id: ${request_id}$"
          REQUEST_ID="$request_id" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          error = json.loads(Path("/tmp/edo-invalid.json").read_text())
          assert set(error) == {"error", "errorCode", "retryable", "requestId"}, error
          assert error["errorCode"] == "INVALID_REQUEST", error
          assert error["retryable"] is False, error
          assert error["requestId"] == os.environ["REQUEST_ID"], error
          PY

      - name: Live GUS canary (non-blocking)
        continue-on-error: true
        timeout-minutes: 3
        env:
          APP_PORT: ${{ env.APP_PORT }}
        run: |
          set -euo pipefail
          trap 'docker logs app || true' ERR
          base="http://localhost:${APP_PORT}"
          start_year="$(date -u -d '120 days ago' +%Y)"
          start_month="$(date -u -d '120 days ago' +%-m)"
          end_year="$(date -u -d '2 months ago' +%Y)"
          end_month="$(date -u -d '2 months ago' +%-m)"

          # These calls intentionally exercise the real provider. Their result is visible in CI,
          # but GUS availability must not gate deterministic verification or image publishing.
          curl -fsS --max-time 10 --retry 2 --retry-delay 2 --retry-all-errors \
            "${base}/v1/inflation/since?year=${start_year}&month=${start_month}" \
            -o /tmp/inflation-since.json
          curl -fsS --max-time 10 --retry 2 --retry-delay 2 --retry-all-errors \
            "${base}/v1/inflation/between?startYear=${start_year}&startMonth=${start_month}&endYear=${end_year}&endMonth=${end_month}" \
            -o /tmp/inflation-between.json
          curl -fsS --max-time 10 --retry 2 --retry-delay 2 --retry-all-errors \
            "${base}/v1/inflation/monthly?startYear=${start_year}&startMonth=${start_month}&endYear=${end_year}&endMonth=${end_month}" \
            -o /tmp/inflation-monthly.json

          python3 - <<'PY'
          import json
          from pathlib import Path

          since = json.loads(Path("/tmp/inflation-since.json").read_text())
          between = json.loads(Path("/tmp/inflation-between.json").read_text())
          monthly = json.loads(Path("/tmp/inflation-monthly.json").read_text())

          assert since["from"] and since["until"] and since["multiplier"], since
          assert between["from"] and between["until"] and between["multiplier"], between
          assert monthly["from"] and monthly["until"] and monthly["points"], monthly
          assert all(point["month"] and point["multiplier"] for point in monthly["points"]), monthly
          PY

      - name: Clean up
        if: always()
        run: docker rm -f app || true

  publish:
    runs-on: ubuntu-24.04
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Publish image
        env:
          JIB_TO_AUTH_USERNAME: ${{ github.actor }}
          JIB_TO_AUTH_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO="${GITHUB_REPOSITORY#*/}"
          IMAGE="ghcr.io/${OWNER}/${REPO}"
          SHA_TAG="sha-$(git rev-parse --short HEAD)"

          ./gradlew jib -PpublishMultiPlatformImage=true -Djib.to.image="${IMAGE}:${SHA_TAG}" -Djib.to.tags=latest
