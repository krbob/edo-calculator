name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_PORT: 8080

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      - name: Verify dependency locks
        run: |
          set -euo pipefail
          ./gradlew resolveAndLockAll --write-locks
          lock_changes="$(git status --porcelain -- '*gradle.lockfile')"
          if [[ -n "$lock_changes" ]]; then
            echo "Dependency lockfiles are stale:"
            echo "$lock_changes"
            exit 1
          fi

      - name: Run verification and assemble
        run: ./gradlew test detekt assemble

      - name: Generate reproducible CycloneDX SBOM
        id: sbom
        run: |
          set -euo pipefail
          sbom="build/reports/cyclonedx/edo-calculator.cdx.json"
          ./gradlew cyclonedxBom --rerun-tasks
          first_hash="$(sha256sum "$sbom" | cut -d ' ' -f 1)"
          ./gradlew cyclonedxBom --rerun-tasks
          second_hash="$(sha256sum "$sbom" | cut -d ' ' -f 1)"
          if [[ "$first_hash" != "$second_hash" ]]; then
            echo "CycloneDX SBOM is not reproducible: $first_hash != $second_hash"
            exit 1
          fi
          echo "sha256=$second_hash" >> "$GITHUB_OUTPUT"

      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: edo-calculator-sbom-${{ steps.sbom.outputs.sha256 }}
          path: build/reports/cyclonedx/edo-calculator.cdx.json
          if-no-files-found: error
          retention-days: 14

      - name: Scan runtime dependencies
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_OFFLINE_SCAN: 'true'
        with:
          scan-type: sbom
          scan-ref: build/reports/cyclonedx/edo-calculator.cdx.json
          # renovate: datasource=github-releases depName=aquasecurity/trivy
          version: v0.72.0
          scanners: vuln
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          hide-progress: true
          timeout: 10m0s

      - name: Derive local image tag
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "image=ktor-app:test-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build local image
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
        run: ./gradlew jibDockerBuild --image="$IMAGE"

      - name: Scan local image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.meta.outputs.image }}
          skip-setup-trivy: true
          scanners: vuln
          vuln-type: os
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          hide-progress: true
          timeout: 10m0s

      - name: Run container
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          APP_PORT: ${{ env.APP_PORT }}
        run: |
          docker rm -f app || true
          docker run -d --name app -p "${APP_PORT}:${APP_PORT}" "$IMAGE"

      - name: Wait until health and endpoints return 200
        env:
          APP_PORT: ${{ env.APP_PORT }}
        run: |
          set -euo pipefail
          base="http://localhost:${APP_PORT}"
          purchase_year="$(date -u -d '30 days ago' +%Y)"
          purchase_month="$(date -u -d '30 days ago' +%-m)"
          purchase_day="$(date -u -d '30 days ago' +%-d)"
          today_year="$(date -u +%Y)"
          today_month="$(date -u +%-m)"
          today_day="$(date -u +%-d)"
          # Use an older CPI window in smoke checks. The explicit inflation endpoints are strict
          # about missing monthly CPI data and may return 503 for the latest not-yet-published month.
          cpi_start_year="$(date -u -d '120 days ago' +%Y)"
          cpi_start_month="$(date -u -d '120 days ago' +%-m)"
          cpi_end_year="$(date -u -d '2 months ago' +%Y)"
          cpi_end_month="$(date -u -d '2 months ago' +%-m)"
          URLS=(
            "/healthz"
            "/edo/value?purchaseYear=${purchase_year}&purchaseMonth=${purchase_month}&purchaseDay=${purchase_day}&firstPeriodRate=2.7&margin=1.5"
            "/edo/value/at?purchaseYear=${purchase_year}&purchaseMonth=${purchase_month}&purchaseDay=${purchase_day}&firstPeriodRate=2.7&margin=1.5&asOfYear=${today_year}&asOfMonth=${today_month}&asOfDay=${today_day}"
            "/edo/history?purchaseYear=${purchase_year}&purchaseMonth=${purchase_month}&purchaseDay=${purchase_day}&firstPeriodRate=2.7&margin=1.5"
            "/edo/history?purchaseYear=${purchase_year}&purchaseMonth=${purchase_month}&purchaseDay=${purchase_day}&fromYear=${purchase_year}&fromMonth=${purchase_month}&fromDay=${purchase_day}&toYear=${today_year}&toMonth=${today_month}&toDay=${today_day}&firstPeriodRate=2.7&margin=1.5"
            "/inflation/between?startYear=${cpi_start_year}&startMonth=${cpi_start_month}&endYear=${cpi_end_year}&endMonth=${cpi_end_month}"
            "/inflation/monthly?startYear=${cpi_start_year}&startMonth=${cpi_start_month}&endYear=${cpi_end_year}&endMonth=${cpi_end_month}"
          )
          echo "⏳ Checking ${#URLS[@]} endpoint(s)..."

          wait_for_200() {
            local url="$1"
            echo "→ Waiting for 200 from: $url"
            for _ in $(seq 1 60); do
              if curl -fsS --max-time 1 "$url" > /dev/null; then
                echo "✅ 200 from: $url"
                return 0
              fi
              sleep 1
            done
            echo "❌ No 200 response within 60s from: $url"
            return 1
          }

          failures=0
          for raw in "${URLS[@]}"; do
            url="${base}${raw}"

            if ! wait_for_200 "$url"; then
              failures=$((failures+1))
            fi
          done

          if [[ $failures -gt 0 ]]; then
            echo "📜 Container logs (some checks failed):"
            docker logs app || true
            exit 1
          fi
          echo "🎉 All endpoints responded with 200"

      - name: Smoke test edo history payload
        env:
          APP_PORT: ${{ env.APP_PORT }}
        run: |
          set -euo pipefail
          base="http://localhost:${APP_PORT}"
          purchase_year="$(date -u -d '30 days ago' +%Y)"
          purchase_month="$(date -u -d '30 days ago' +%-m)"
          purchase_day="$(date -u -d '30 days ago' +%-d)"
          today_year="$(date -u +%Y)"
          today_month="$(date -u +%-m)"
          today_day="$(date -u +%-d)"

          response="$(
            curl -fsS \
              "${base}/edo/history?purchaseYear=${purchase_year}&purchaseMonth=${purchase_month}&purchaseDay=${purchase_day}&fromYear=${purchase_year}&fromMonth=${purchase_month}&fromDay=${purchase_day}&toYear=${today_year}&toMonth=${today_month}&toDay=${today_day}&firstPeriodRate=2.7&margin=1.5"
          )"

          echo "$response" | grep -q '"purchaseDate"'
          echo "$response" | grep -q '"points"'
          echo "$response" | grep -q '"totalValue"'

      - name: Smoke test edo history payload without explicit range
        env:
          APP_PORT: ${{ env.APP_PORT }}
        run: |
          set -euo pipefail
          base="http://localhost:${APP_PORT}"
          purchase_year="$(date -u -d '30 days ago' +%Y)"
          purchase_month="$(date -u -d '30 days ago' +%-m)"
          purchase_day="$(date -u -d '30 days ago' +%-d)"

          response="$(
            curl -fsS \
              "${base}/edo/history?purchaseYear=${purchase_year}&purchaseMonth=${purchase_month}&purchaseDay=${purchase_day}&firstPeriodRate=2.7&margin=1.5"
          )"

          echo "$response" | grep -q '"purchaseDate"'
          echo "$response" | grep -q '"from"'
          echo "$response" | grep -q '"until"'
          echo "$response" | grep -q '"points"'

      - name: Smoke test inflation monthly payload
        env:
          APP_PORT: ${{ env.APP_PORT }}
        run: |
          set -euo pipefail
          base="http://localhost:${APP_PORT}"
          start_year="$(date -u -d '120 days ago' +%Y)"
          start_month="$(date -u -d '120 days ago' +%-m)"
          end_year="$(date -u -d '2 months ago' +%Y)"
          end_month="$(date -u -d '2 months ago' +%-m)"

          response="$(
            curl -fsS \
              "${base}/inflation/monthly?startYear=${start_year}&startMonth=${start_month}&endYear=${end_year}&endMonth=${end_month}"
          )"

          echo "$response" | grep -q '"from"'
          echo "$response" | grep -q '"until"'
          echo "$response" | grep -q '"points"'
          echo "$response" | grep -q '"month"'
          echo "$response" | grep -q '"multiplier"'

      - name: Clean up
        if: always()
        run: docker rm -f app || true

  publish:
    runs-on: ubuntu-24.04
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Publish image
        env:
          JIB_TO_AUTH_USERNAME: ${{ github.actor }}
          JIB_TO_AUTH_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO="${GITHUB_REPOSITORY#*/}"
          IMAGE="ghcr.io/${OWNER}/${REPO}"
          SHA_TAG="sha-$(git rev-parse --short HEAD)"

          ./gradlew jib -PpublishMultiPlatformImage=true -Djib.to.image="${IMAGE}:${SHA_TAG}" -Djib.to.tags=latest
